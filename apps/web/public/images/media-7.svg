<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <style>
      .media-text { font-family: Arial, sans-serif; font-size: 36px; font-weight: bold; fill: #333; }
      .media-accent { font-size: 28px; fill: #ff9900; }
    </style>
  </defs>
  <rect width="200" height="80" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="100" y="50" text-anchor="middle" class="media-text">Digital</text>
  <text x="100" y="65" text-anchor="middle" class="media-accent">Media</text>
</svg>